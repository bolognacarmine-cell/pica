kind = "web"
previewPath = "/"
title = "Pica Caravan"
version = "1.0.0"
id = "artifacts/pica-caravan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22025

[services.development]
run = "pnpm --filter @workspace/pica-caravan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pica-caravan", "run", "build" ]
publicDir = "artifacts/pica-caravan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22025"
BASE_PATH = "/"
