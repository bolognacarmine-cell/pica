services:
  - type: web
    name: pica-caravan
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: picacaravan_db
      - key: ADMIN_USER
        value: picacaravan
      - key: ADMIN_PASSWORD
        value: pica2026
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: NUXT_PUBLIC_SITE_URL
        value: https://pica-caravan.onrender.com
      - key: NUXT_PUBLIC_API_BASE
        value: https://pica-caravan.onrender.com
